<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Invitación Xóchitl &amp; Sarbjit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Great+Vibes&family=Montserrat:wght@200;300;400&family=Noto+Sans+Gurmukhi:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--cream:#FEF9F6;--pk:#D4608A;--gold:#A8720A;--text:#1A0C10;--muted:#6A3848;--serif:'Cormorant Garamond',serif;--script:'Great Vibes',cursive;--sans:'Montserrat',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--text);font-family:var(--sans);overflow-x:hidden;font-size:14px;line-height:1.6;}
.floral-bg{background:var(--cream);background-image:radial-gradient(ellipse at 0% 0%,rgba(242,196,208,.25) 0%,transparent 45%),radial-gradient(ellipse at 100% 100%,rgba(184,204,165,.2) 0%,transparent 45%);}
.sp{padding:56px 20px;}.inn{max-width:900px;margin:0 auto;text-align:center;}
.sc-ttl{font-family:var(--script);font-size:clamp(2.4rem,6vw,3.8rem);line-height:1.3;margin-bottom:8px;padding-top:4px;overflow:visible;background:linear-gradient(160deg,#FFE08A 0%,#C8860A 20%,#F5D060 38%,#A06010 55%,#F0C840 72%,#8B5E08 88%,#E8C050 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 6px rgba(160,100,0,.45));}
.gl{font-size:.6rem;letter-spacing:5px;text-transform:uppercase;display:block;margin-bottom:10px;font-family:var(--sans);font-weight:400;background:linear-gradient(160deg,#FFE08A 0%,#C8860A 20%,#F5D060 38%,#A06010 55%,#F0C840 72%,#8B5E08 88%,#E8C050 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.bt{font-size:.88rem;line-height:1.9;color:#2A1018;font-weight:400;font-family:var(--sans);}
.sf{opacity:0;transform:translateY(22px);transition:opacity .85s,transform .85s;}.sf.vis{opacity:1;transform:none;}
#pc{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;transition:opacity 1.5s;}#pc.show{opacity:.38;}
#lb{position:fixed;inset:0;background:rgba(10,4,6,.93);z-index:9998;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#lb.open{opacity:1;pointer-events:all;}#lb img{max-width:92vw;max-height:88vh;object-fit:contain;}
#lb-close{position:absolute;top:18px;right:22px;font-size:1.8rem;color:rgba(255,255,255,.7);cursor:pointer;background:none;border:none;}
#lb-prev,#lb-next{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(254,248,245,.15);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;}
#lb-prev{left:16px;}#lb-next{right:16px;}#lb-prev svg,#lb-next svg{width:16px;height:16px;fill:white;}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;padding:0 14px;height:48px;background:rgba(254,249,246,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,150,90,.18);}
.bar-left{flex:1;}.bar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ham-btn{display:flex;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;background:none;border:none;cursor:pointer;padding:4px;}
.ham-btn span{display:block;height:2px;background:var(--gold);border-radius:2px;transition:all .3s;}
.ham-btn.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.ham-btn.open span:nth-child(2){opacity:0;}
.ham-btn.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
#bar-center{position:absolute;left:0;right:0;top:0;bottom:0;display:grid;place-items:center;pointer-events:none;}
.lang-dw{position:relative;display:flex;align-items:center;gap:4px;}
.lang-icon-btn{background:none;border:none;padding:5px 7px;cursor:pointer;display:flex;align-items:center;}
.lang-dd{display:none;position:absolute;top:calc(100% + 7px);right:0;background:white;border:1px solid rgba(200,150,90,.28);box-shadow:0 8px 28px rgba(60,30,40,.12);min-width:148px;z-index:200;border-radius:4px;overflow:hidden;}
.lang-dd.open{display:block;}
.lang-opt{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);cursor:pointer;border:none;background:none;width:100%;font-family:var(--sans);font-weight:300;}
.lang-opt:hover,.lang-opt.active{background:#FAEEF2;color:var(--pk);}
.lo-check{margin-left:auto;color:var(--pk);font-size:.8rem;opacity:0;}.lang-opt.active .lo-check{opacity:1;}
#lang-label{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:var(--sans);font-weight:400;user-select:none;}
#fmp{position:fixed;bottom:26px;right:18px;z-index:200;width:62px;height:62px;border-radius:50%;background:rgba(253,232,242,.96);box-shadow:0 4px 22px rgba(232,160,180,.5);opacity:0;transform:translateY(14px) scale(.9);transition:opacity .5s,transform .5s;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#fmp.show{opacity:1;transform:none;}
#fmp-ring-wrap{position:absolute;inset:0;pointer-events:none;}
#fmp-ring-bg{stroke:rgba(242,184,202,.3);fill:none;stroke-width:3;}
#fmp-ring-fill{stroke:#F2B8CA;fill:none;stroke-width:3;stroke-linecap:round;stroke-dasharray:170;stroke-dashoffset:170;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .5s linear;}
#nav-drawer{position:fixed;top:48px;left:0;bottom:0;width:min(260px,80vw);background:rgba(254,249,246,.98);border-right:1px solid rgba(200,150,90,.18);z-index:99;transform:translateX(-100%);transition:transform .38s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
#nav-drawer.open{transform:translateX(0);}
#nav-ov{position:fixed;inset:0;top:48px;background:rgba(58,42,46,.18);z-index:98;opacity:0;pointer-events:none;transition:opacity .38s;}
#nav-ov.open{opacity:1;pointer-events:all;}
.nav-inner{padding:24px 0 40px;}.nav-couple{text-align:center;padding:0 20px 20px;border-bottom:1px solid rgba(200,150,90,.15);margin-bottom:6px;}
.nav-cn{font-family:var(--script);font-size:1.55rem;color:var(--text);}
.nav-cd{font-size:.52rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-top:3px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 22px;color:var(--text);font-size:.62rem;letter-spacing:2px;text-transform:uppercase;font-weight:300;cursor:pointer;border:none;background:none;width:100%;font-family:var(--sans);}
.nav-item:hover{background:#FAEEF2;color:var(--pk);}
.ni{filter:sepia(1) saturate(4) hue-rotate(-15deg) brightness(.85);}
.nav-sep{height:1px;background:rgba(200,150,90,.12);margin:4px 20px;}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px 60px;position:relative;overflow:hidden;background:linear-gradient(160deg,#F9EEF3,#EEE4F0);}
.hero-bg{position:absolute;inset:0;background-image:url('img/IMG_7517.jpeg');background-size:cover;background-position:center;z-index:0;}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,8,12,.4),rgba(20,8,12,.18) 40%,rgba(20,8,12,.46));}
.hero>*{position:relative;z-index:1;}
.hero::before{content:'';position:absolute;top:58px;left:18px;width:54px;height:54px;border-top:1px solid rgba(200,150,90,.3);border-left:1px solid rgba(200,150,90,.3);z-index:1;}
.hero::after{content:'';position:absolute;top:58px;right:18px;width:54px;height:54px;border-top:1px solid rgba(200,150,90,.3);border-right:1px solid rgba(200,150,90,.3);z-index:1;}
.hcbl{position:absolute;bottom:38px;left:18px;width:54px;height:54px;border-bottom:1px solid rgba(200,150,90,.3);border-left:1px solid rgba(200,150,90,.3);z-index:1;}
.hcbr{position:absolute;bottom:38px;right:18px;width:54px;height:54px;border-bottom:1px solid rgba(200,150,90,.3);border-right:1px solid rgba(200,150,90,.3);z-index:1;}
.hno{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);display:flex;flex-direction:column;align-items:center;max-width:92vw;overflow:visible;padding-bottom:1.2em;z-index:1;}
.nwl{position:absolute;top:0;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:2;white-space:nowrap;transition:opacity .6s,transform .6s;transform-origin:center top;}
.nwl.exit{opacity:0;transform:translateX(-50%) scale(.92) translateY(-14px);}
.nwl-ln{display:block;font-family:var(--script);font-size:clamp(3.2rem,11vw,6.5rem);color:#fff;white-space:nowrap;text-shadow:0 2px 18px rgba(20,8,12,.6);overflow:visible;line-height:1.6;padding-bottom:.3em;}
.nwl-ln.amp-line{color:#C8965A;font-size:clamp(2.6rem,9vw,5.4rem);line-height:1.1;}
.hnf{display:block;font-family:var(--script);font-size:clamp(2.8rem,9vw,5.5rem);color:#fff;white-space:nowrap;opacity:0;transform:translateY(24px) scale(.95);transition:opacity .8s,transform .8s;text-shadow:0 2px 18px rgba(20,8,12,.6);overflow:visible;line-height:1.3;}
.hnf.show{opacity:1;transform:none;}
.hnf .amp{background:linear-gradient(160deg,#E8C068,#C8965A 30%,#F0D080 50%,#A87030 70%,#D4A850);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.wc{display:inline-block;padding:.35em .25em 1em;margin:-.35em -.25em -1em;clip-path:inset(-80% 103% -800% -30%);opacity:0;transition:clip-path .4s ease-out,opacity .4s ease-out;vertical-align:baseline;}
.wc.on{clip-path:inset(-80% -30% -800% -30%);opacity:1;}
.wc-amp{color:#C8965A;}
#quill{position:absolute;width:clamp(28px,4.5vw,44px);pointer-events:none;opacity:0;z-index:10;transform-origin:50% 10%;transform:rotate(28deg);transition:left .12s,top .12s,opacity .4s;}
@keyframes qWrite{0%{transform:rotate(28deg)}50%{transform:rotate(27deg) translateY(3px)}100%{transform:rotate(28deg)}}
#quill.writing{animation:qWrite .22s ease-in-out infinite;}
.hiw{overflow:hidden;max-height:0;opacity:0;transition:max-height .7s,opacity .6s;margin-top:0;width:100%;text-align:center;}
.hiw.show{max-height:40px;opacity:1;margin-top:14px;}
.hss{position:absolute;inset:0;z-index:0;opacity:0;transition:opacity 1s;}.hss.show{opacity:1;}
.ss-frame{position:absolute;inset:0;overflow:hidden;}
.ss-slide{position:absolute;inset:0;opacity:0;transition:opacity 2.8s ease-in-out;}.ss-slide.active{opacity:1;}
.ss-slide img{width:100%;height:100%;object-fit:cover;display:block;}
.ss-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,8,12,.35),rgba(20,8,12,.15) 45%,rgba(20,8,12,.45));z-index:1;}
.ss-arr{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:3;}
.ssa{width:36px;height:36px;border-radius:50%;background:rgba(254,249,246,.7);border:1px solid rgba(200,150,90,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ssa svg{width:14px;height:14px;fill:var(--text);}
.ss-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:3;}
.ss-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;border:none;padding:0;transition:background .3s,transform .3s;}
.ss-dot.active{background:var(--gold);transform:scale(1.4);}
#sec-nombram{position:relative;overflow:visible;background:linear-gradient(160deg,#F9EEF3,#F2E4EC 50%,#EEE4F0);}
.nom-frame-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.nombram-inner{position:relative;z-index:2;padding:0 24px;}
.nm-item{margin-bottom:28px;text-align:center;}
.nm-role{font-size:.68rem;letter-spacing:5px;text-transform:uppercase;font-weight:700;margin-bottom:8px;background:linear-gradient(160deg,#FFE08A,#C8860A 20%,#F5D060 38%,#A06010 55%,#F0C840 72%,#8B5E08 88%,#E8C050);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;-webkit-text-stroke:0.3px #A06010;}
.nm-names{font-family:var(--serif);font-size:1.25rem;font-style:italic;color:#3A1428;line-height:2;font-weight:600;}
.ec-grid{display:flex;justify-content:center;flex-wrap:wrap;gap:18px;max-width:900px;margin:32px auto 0;padding:0 16px;}
.ecard{background:#F8F2E6;border-radius:6px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.28);transition:transform .3s;width:min(280px,88vw);}
.ecard:hover{transform:translateY(-5px);}
.ecard-img{width:100%;height:160px;object-fit:cover;display:block;}
.ecard-body{padding:18px 16px;}
.ecard-title{font-family:var(--script);font-size:1.7rem;color:#8B5E20;text-align:center;margin-bottom:4px;}
.ecard-dots{text-align:center;letter-spacing:5px;color:rgba(180,130,60,.45);font-size:.5rem;margin:8px 0;}
.ecard-lbl{font-size:.5rem;letter-spacing:4px;text-transform:uppercase;color:#8B5E20;font-weight:700;text-align:center;margin-bottom:3px;}
.ecard-info{font-family:var(--serif);font-size:.88rem;color:#3A2510;text-align:center;line-height:1.65;}
.ecard-hora{font-family:var(--serif);font-size:1.1rem;font-style:italic;color:#8B5E20;text-align:center;margin-top:4px;}
.dress-cols{display:flex;justify-content:center;gap:clamp(40px,14vw,100px);margin:32px auto 24px;align-items:flex-end;flex-wrap:wrap;}
.dress-col{text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
.dress-lbl{font-size:.56rem;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:600;}
.avoid-lbl{font-size:.82rem;color:#5A3A44;margin:18px 0 10px;}
.avoid-sw{display:flex;justify-content:center;gap:16px;}
.av-sw{width:46px;height:46px;border-radius:50%;border:2px solid rgba(100,60,40,.25);box-shadow:inset 0 0 0 1px rgba(255,255,255,.6),0 2px 6px rgba(0,0,0,.15);}
@keyframes bulbGlow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes ropeSway{0%,100%{transform:translateX(-4px)}50%{transform:translateX(4px)}}
@keyframes swing0{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes swing1{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(7deg)}}
@keyframes swing2{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(5deg)}}
@keyframes swing3{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(8deg)}}
@keyframes swing4{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(4deg)}}
@keyframes swing5{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
#gal-rope{animation:ropeSway 3.5s ease-in-out infinite;}
.gal-item{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transition:opacity .7s ease,filter .7s ease;}
.gal-swing{display:flex;flex-direction:column;align-items:center;transform-origin:top center;}
.gal-swing.s0{animation:swing0 3.2s ease-in-out -0.0s infinite;}
.gal-swing.s1{animation:swing1 3.6s ease-in-out -1.1s infinite;}
.gal-swing.s2{animation:swing2 3.0s ease-in-out -0.8s infinite;}
.gal-swing.s3{animation:swing3 3.8s ease-in-out -1.9s infinite;}
.gal-swing.s4{animation:swing4 3.4s ease-in-out -0.5s infinite;}
.gal-swing.s5{animation:swing5 3.7s ease-in-out -1.4s infinite;}
.cp{width:24px;margin:0 auto;}
.cp-top{width:24px;height:14px;display:flex;gap:3px;}
.cp-arm{flex:1;background:linear-gradient(to bottom,#E8C888,#C8A060,#A07840);border-radius:3px 3px 0 0;}
.cp-spring{width:10px;height:10px;border:2.5px solid #999;border-radius:50%;margin:0 auto;background:radial-gradient(circle at 35% 35%,#CCC,#888);}
.cp-stem{width:6px;height:22px;background:linear-gradient(to bottom,#C8A060,#A07840);margin:0 auto;}
.cp-bottom{width:18px;height:16px;background:linear-gradient(to bottom,#C8A060,#A07840,#886030);border-radius:0 0 4px 4px;margin:0 auto;box-shadow:1px 2px 4px rgba(0,0,0,.5);}
.sg-photo{background:#FEFCF8;padding:9px 9px 44px;box-shadow:0 20px 60px rgba(0,0,0,.4);cursor:pointer;width:240px;}
.sg-photo img{width:100%;aspect-ratio:.85;object-fit:cover;display:block;}
.sg-ph{width:100%;aspect-ratio:.85;background:#D8C4D0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
#rope-bulbs{position:absolute;top:0;left:0;right:0;height:70px;pointer-events:none;z-index:2;}
.rb-stem{position:absolute;width:2px;height:11px;background:#5A3A10;transform:translateX(-50%);}
.rb-bulb{position:absolute;width:12px;height:12px;border-radius:50%;background:#FFD060;transform:translateX(-50%);box-shadow:0 0 8px 3px rgba(255,176,0,.8),0 0 18px 6px rgba(255,90,0,.45);}
.gifts-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-top:24px;}
.bank-flip-wrap{width:200px;height:168px;flex-shrink:0;perspective:900px;cursor:pointer;}
.bank-flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);}
.bank-flip-wrap.flipped .bank-flip-inner{transform:rotateY(180deg);}
.bank-face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;border:1px solid rgba(200,150,90,.28);background:white;overflow:hidden;}
.bank-face-front{display:flex;flex-direction:column;align-items:stretch;}
.bank-face-back{transform:rotateY(180deg);display:flex;flex-direction:column;align-items:stretch;justify-content:center;padding:8px 14px;}
.bank-field{width:100%;padding:5px 0;border-bottom:1px solid rgba(200,150,90,.12);text-align:center;}
.bank-field:last-child{border-bottom:none;}
.bank-field-lbl{font-size:.48rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;display:block;margin-bottom:3px;}
.bank-field-row{display:flex;align-items:center;justify-content:center;gap:4px;min-height:20px;}
.bank-field-val{font-family:var(--serif);font-size:.95rem;font-style:italic;color:var(--text);}
.bank-copy-ic{background:none;border:none;cursor:pointer;padding:3px;color:rgba(200,150,90,.5);}
.gc-logo{flex:1;display:flex;align-items:center;justify-content:center;}
.h-cards{display:flex;flex-wrap:wrap;justify-content:center;gap:18px;max-width:860px;margin:28px auto 0;}
.h-card{background:white;border:1px solid rgba(200,150,90,.28);padding:22px 18px;min-width:195px;max-width:250px;flex:1;text-align:center;position:relative;overflow:hidden;}
.h-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--pk));}
.h-stars{color:var(--gold);font-size:.72rem;letter-spacing:2px;margin-bottom:7px;}
.h-name{font-family:var(--serif);font-size:1.05rem;font-style:italic;color:#1A0C10;margin-bottom:5px;font-weight:600;}
.h-dist{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:#7A4A00;margin-bottom:8px;font-weight:600;}
.h-note{font-size:.7rem;color:#3A1820;line-height:1.8;padding-top:8px;border-top:1px solid rgba(200,150,90,.25);font-weight:400;}
.h-link{display:inline-block;margin-top:10px;font-size:.56rem;letter-spacing:2px;text-transform:uppercase;color:#1A0C10;text-decoration:none;border-bottom:1px solid rgba(160,100,40,.6);font-weight:600;}
.rsvp-grid{display:grid;grid-template-columns:1fr 210px;gap:22px;max-width:720px;margin:28px auto 0;align-items:start;}
@media(max-width:640px){
  .qt{font-size:1.6rem;font-weight:700;color:#3A1428;-webkit-text-stroke:0.5px #3A1428;text-shadow:none;line-height:1.9;}
  .quote-s{padding:60px 18px;}
  .rsvp-grid{display:flex !important;flex-direction:column !important;max-width:420px;margin-left:auto;margin-right:auto;}
  .rsvp-box{order:1;}
  .rwa{order:2;margin-top:16px;}
}
.rsvp-box{background:white;border:1px solid rgba(200,150,90,.22);padding:26px 20px;}
.rr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.rfg{margin-bottom:12px;}
.rl{display:block;font-size:.54rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-weight:500;}
.rl .req{color:var(--pk);}
.ri,.rta{width:100%;border:1px solid rgba(200,150,90,.3);background:#FDFAF8;padding:9px 11px;font-family:var(--serif);font-size:.95rem;color:var(--text);font-style:italic;outline:none;}
.rta{resize:vertical;min-height:76px;}

function getRopeY(pct,svgH){
  var x=(pct/100)*1000,period=200,phase=x%period,t,y;
  if(phase<=100){t=phase/100;y=(1-t)*(1-t)*14+2*(1-t)*t*7+t*t*14;}
  else{t=(phase-100)/100;y=(1-t)*(1-t)*14+2*(1-t)*t*21+t*t*14;}
  return (y/28)*svgH;
}

function buildRopeBulbs(){
  var cont=document.getElementById('rope-bulbs');
  var svg=document.getElementById('gal-rope');
  if(!cont||!svg)return;
  var svgH=svg.getBoundingClientRect().height;
  if(!svgH){requestAnimationFrame(buildRopeBulbs);return;}
  cont.innerHTML='';
  cont.style.height=(svgH+24)+'px';
  BULB_DATA.forEach(function(b){
    var wy=getRopeY(b.pct,svgH);
    var stem=document.createElement('div');
    stem.className='rb-stem';

}

function triggerWrite(){
  if(wT)return;wT=true;var outer=document.getElementById('hno'),quill=document.getElementById('quill');
  var chars=Array.prototype.slice.call(document.querySelectorAll('#wn1 .wc,#wamp .wc,#wn2 .wc'));if(!chars.length||!outer||!quill)return;
  var qW=quill.offsetWidth||36,qH=quill.offsetHeight||90;quill.style.opacity='1';quill.classList.add('writing');var cMs=170,delay=300;
  chars.forEach(function(s,i){if(!s)return;var isSp=(s.innerHTML||'').trim()==='';var dur=isSp?40:cMs+Math.random()*60;
    setTimeout((function(sp,isp,isLast){return function(){if(!sp)return;var sR=sp.getBoundingClientRect(),oR=outer.getBoundingClientRect();quill.style.left=(sR.left-oR.left+(isLast?sR.width*.85:sR.width*.18)-qW*.5)+'px';quill.style.top=(sR.top-oR.top+sR.height*.65-qH*.88)+'px';sp.style.transition='clip-path '+(isp?0:cMs*.85)+'ms ease-out';sp.classList.add('on');};})(s,isSp,i===chars.length-1),delay);delay+=dur;});
  var tot=delay;
  setTimeout(function(){if(quill){quill.classList.remove('writing');quill.style.opacity='0';}},tot+120);
  setTimeout(function(){var n=document.getElementById('nwl');if(n)n.classList.add('exit');},tot+450);
  setTimeout(function(){var hh=document.getElementById('hnf');if(hh){hh.classList.add('show');var amp=hh.querySelector('.amp');if(amp){amp.style.background='linear-gradient(160deg,#E8C068,#C8965A 30%,#F0D080 50%,#A87030 70%,#D4A850)';amp.style.webkitBackgroundClip='text';amp.style.webkitTextFillColor='transparent';amp.style.backgroundClip='text';}}},tot+750);
  setTimeout(function(){var w=document.getElementById('hiw');if(w)w.classList.add('show');},tot+1100);
  setTimeout(function(){var s=document.getElementById('hss');if(s){s.classList.add('show');startSS();}if(CFG.songAudio&&!playing){if(!audio){audio=new Audio(CFG.songAudio);audio.onended=stopSong;audio.ontimeupdate=updateFmpUI;}audio.currentTime=18;audio.play().then(function(){playing=true;setSongUI(true);}).catch(function(){});}},tot+1500);
}

function stopSong(){playing=false;setSongUI(false);}
function updateFmpUI(){var ring=document.getElementById('fmp-ring-fill');if(ring&&audio&&audio.duration)ring.style.strokeDashoffset=((2*Math.PI*27)*(1-audio.currentTime/audio.duration)).toFixed(2);}
function toggleSong(){if(CFG.songAudio){if(!audio){audio=new Audio(CFG.songAudio);audio.onended=stopSong;audio.ontimeupdate=updateFmpUI;}if(playing){audio.pause();stopSong();}else{audio.currentTime=audio.currentTime||18;audio.play().then(function(){playing=true;setSongUI(true);}).catch(function(){});}}else{if(!playing){playing=true;setSongUI(true);window.open(CFG.songSpotify,'_blank');}else stopSong();}}

function mkP(){return{x:Math.random()*innerWidth,y:Math.random()*-innerHeight,r:Math.random()*7+4,sp:Math.random()*1+.4,sx:Math.random()*1.2-.6,sw:Math.random()*.03+.01,sc:Math.random()*Math.PI*2,op:Math.random()*.5+.2,h:Math.random()<.5,fk:Math.random()*Math.PI*2,fks:Math.random()*.18+.08,fkd:Math.random()*.55+.25};}
function initPetals(){pC=document.getElementById('pc');if(!pC)return;pC.width=innerWidth;pC.height=innerHeight;pX=pC.getContext('2d');window.addEventListener('resize',function(){if(pC){pC.width=innerWidth;pC.height=innerHeight;}});for(var i=0;i<12;i++)pts.push(mkP());pC.classList.add('show');pR=true;animP();}
function animP(){
  if(!pR)return;
  pX.clearRect(0,0,pC.width,pC.height);
  pts.forEach(function(p){
    p.y+=p.sp;p.x+=Math.sin(p.sc)*p.sx;p.sc+=p.sw;p.fk+=p.fks;
    var flicker=1-(p.fkd*(0.6*(0.5+0.5*Math.sin(p.fk))+0.4*(0.5+0.5*Math.sin(p.fk*2.3+1.1))));
    var px=p.x+Math.sin(p.sc)*3;
    var dx=px-mouseX,dy=p.y-mouseY,dist=Math.sqrt(dx*dx+dy*dy);
    var proximity=Math.max(0,1-dist/180);
    var eased=proximity*proximity*(3-2*proximity);
    var sr=p.r*(1+eased*0.55);
    pX.save();
    pX.translate(px,p.y);
    pX.globalAlpha=Math.min(1,(0.45+flicker*0.45)+(0.1)*eased);
    pX.filter='blur('+(Math.max(0,5*(1-eased))).toFixed(1)+'px)';
    pX.shadowColor='rgba(220,80,140,'+(0.25+eased*0.65)+')';
    pX.shadowBlur=4+eased*26;
    if(p.h){
      pX.beginPath();pX.moveTo(0,-sr);pX.bezierCurveTo(sr,-sr,sr,sr/2,0,sr);pX.bezierCurveTo(-sr,sr/2,-sr,-sr,0,-sr);
      pX.fillStyle='rgb('+Math.round(242+flicker*8)+','+Math.round(198+flicker*6)+','+Math.round(208+flicker*8)+')';
      pX.fill();
    } else {
      pX.beginPath();pX.ellipse(0,0,sr*.6,sr,Math.sin(p.sc)*.5,0,Math.PI*2);
      pX.fillStyle='rgba('+Math.round(232+flicker*10+eased*12)+','+Math.round(148+flicker*8)+','+Math.round(178+flicker*12)+',.92)';
      pX.fill();
    }
    pX.restore();
    if(p.y>innerHeight+20){p.y=-20;p.x=Math.random()*innerWidth;}
  });
  requestAnimationFrame(animP);
}
document.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY;});

  document.addEventListener('keydown',function(e){var lb=document.getElementById('lb');if(!lb||!lb.classList.contains('open'))return;if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft'){lbIdx=(lbIdx-1+lbImgs.length)%lbImgs.length;var img=document.getElementById('lb-img');if(img)img.src=lbImgs[lbIdx]||'';}if(e.key==='ArrowRight'){lbIdx=(lbIdx+1)%lbImgs.length;var img2=document.getElementById('lb-img');if(img2)img2.src=lbImgs[lbIdx]||'';}});

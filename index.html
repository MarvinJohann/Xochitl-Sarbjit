function submitRSVP(){var fn=((document.getElementById('ri-fn')||{}).value||'').trim();var ln=((document.getElementById('ri-ln')||{}).value||'').trim();var msg=((document.getElementById('ri-msg')||{}).value||'').trim();var adultsRaw=(document.getElementById('ri-adults')||{}).value||'';var adults=parseInt(adultsRaw);var errors=[],t=T[currentLang]||T.es;if(!fn)errors.push(t.rsvpFname||'Nombre');if(!ln)errors.push(t.rsvpLname||'Apellido');if(adultsRaw===''||isNaN(adults)||adults<1)errors.push(t.rsvpAdults||'Número de adultos');if(errors.length){['ri-fn','ri-ln','ri-adults'].forEach(function(id){var el=document.getElementById(id);if(!el)return;var ok=(id==='ri-fn'?!!fn:id==='ri-ln'?!!ln:adultsRaw!==''&&!isNaN(adults)&&adults>=1);el.style.border=ok?'1px solid rgba(200,150,90,.3)':'2px solid #C0392B';el.style.background=ok?'#FDFAF8':'#FFF5F5';});var errBox=document.getElementById('rsvp-err');if(!errBox){errBox=document.createElement('div');errBox.id='rsvp-err';errBox.style.cssText='margin-top:12px;padding:10px 14px;background:#FFF0F0;border:1px solid #C0392B;border-radius:3px;font-family:var(--sans);font-size:.62rem;color:#C0392B;letter-spacing:1px;text-align:left;line-height:1.8;';var btn=document.getElementById('rsvp-submit');if(btn&&btn.parentNode)btn.parentNode.insertBefore(errBox,btn.nextSibling);}errBox.innerHTML='&#9888; '+(t.rsvpErrorMsg||'Por favor completa:')+' <strong>'+errors.join(', ')+'</strong>';errBox.style.display='block';return;}['ri-fn','ri-ln','ri-adults'].forEach(function(id){var el=document.getElementById(id);if(el){el.style.border='1px solid rgba(200,150,90,.3)';el.style.background='#FDFAF8';}});var errBox=document.getElementById('rsvp-err');if(errBox)errBox.style.display='none';var confID=genConfID();showQRModal(fn,ln,adults,confID);setTimeout(function(){var entry={nombre:fn,apellido:ln,adultos:adults,mensaje:msg,confirmacion:confID,fecha:new Date().toISOString(),checkedIn:false};db.ref('rsvp/'+confID).set(entry).then(function(){console.log('\u2705',confID);}).catch(function(e){console.error('\u274c',e.message);});},400);}
function setSongUI(on){var fpi=document.getElementById('fmp-pi');if(fpi)fpi.innerHTML=on?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';}
function stopSong(){playing=false;setSongUI(false);}
function updateFmpUI(){var ring=document.getElementById('fmp-ring-fill');if(ring&&audio&&audio.duration)ring.style.strokeDashoffset=((2*Math.PI*27)*(1-audio.currentTime/audio.duration)).toFixed(2);}
function toggleSong(){if(CFG.songAudio){if(!audio){audio=new Audio(CFG.songAudio);audio.loop=false;audio.onended=stopSong;audio.ontimeupdate=updateFmpUI;}if(playing){audio.pause();stopSong();}else{audio.currentTime=audio.currentTime||18;audio.play().then(function(){playing=true;setSongUI(true);}).catch(function(){});}}else{if(!playing){playing=true;setSongUI(true);window.open(CFG.songSpotify,'_blank');}else stopSong();}}
function mkP(){return{x:Math.random()*innerWidth,y:Math.random()*-innerHeight,r:Math.random()*7+4,sp:Math.random()*1+.4,sx:Math.random()*1.2-.6,sw:Math.random()*.03+.01,sc:Math.random()*Math.PI*2,op:Math.random()*.5+.2,h:Math.random()<.5,fk:Math.random()*Math.PI*2,fks:Math.random()*.18+.08,fkd:Math.random()*.55+.25};}
function initPetals(){pC=document.getElementById('pc');if(!pC)return;pC.width=innerWidth;pC.height=innerHeight;pX=pC.getContext('2d');window.addEventListener('resize',function(){if(pC){pC.width=innerWidth;pC.height=innerHeight;}});for(var i=0;i<12;i++)pts.push(mkP());pC.classList.add('show');pR=true;animP();}
function animP(){if(!pR)return;pX.clearRect(0,0,pC.width,pC.height);pts.forEach(function(p){p.y+=p.sp;p.x+=Math.sin(p.sc)*p.sx;p.sc+=p.sw;p.fk+=p.fks;var flicker=1-(p.fkd*(0.6*(0.5+0.5*Math.sin(p.fk))+0.4*(0.5+0.5*Math.sin(p.fk*2.3+1.1))));var px=p.x+Math.sin(p.sc)*3;var dx=px-mouseX,dy=p.y-mouseY,dist=Math.sqrt(dx*dx+dy*dy);var proximity=Math.max(0,1-dist/180);var eased=proximity*proximity*(3-2*proximity);var sr=p.r*(1+eased*0.55);pX.save();pX.translate(px,p.y);pX.globalAlpha=Math.min(1,(0.45+flicker*0.45)+(0.1)*eased);pX.filter='blur('+(Math.max(0,5*(1-eased))).toFixed(1)+'px)';pX.shadowColor='rgba(220,80,140,'+(0.25+eased*0.65)+')';pX.shadowBlur=4+eased*26;if(p.h){pX.beginPath();pX.moveTo(0,-sr);pX.bezierCurveTo(sr,-sr,sr,sr/2,0,sr);pX.bezierCurveTo(-sr,sr/2,-sr,-sr,0,-sr);pX.fillStyle='rgb('+Math.round(242+flicker*8)+','+Math.round(198+flicker*6)+','+Math.round(208+flicker*8)+')';}else{pX.beginPath();pX.ellipse(0,0,sr*.6,sr,Math.sin(p.sc)*.5,0,Math.PI*2);pX.fillStyle='rgba('+Math.round(232+flicker*10+eased*12)+','+Math.round(148+flicker*8)+','+Math.round(178+flicker*12)+',.92)';}pX.fill();pX.restore();if(p.y>innerHeight+20){p.y=-20;p.x=Math.random()*innerWidth;}});requestAnimationFrame(animP);}
